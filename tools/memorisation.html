<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Memorization Master</title>
    <style>
        body {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100%;
            color: #333;
        }

        html {
            height: 100%;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 700;
        }

        .header p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 16px;
            border: 2px solid #e9ecef;
        }

        .control-group {
            text-align: center;
        }

        .control-label {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #2c3e50;
            display: block;
        }

        .control-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .control-btn {
            padding: 10px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 50px;
        }

        .control-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .game-area {
            text-align: center;
            margin: 40px 0;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 16px;
            border: 2px solid #e9ecef;
            min-height: 300px;
        }

        .session-info {
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
        }

        .display-area {
            font-size: 6em;
            font-weight: 700;
            margin: 40px 0;
            color: #2c3e50;
            font-family: 'Courier New', monospace;
            min-height: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.1em;
        }

        .input-area {
            margin: 30px 0;
        }

        .input-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .number-input {
            font-size: 1.8em;
            padding: 12px 15px;
            border: 3px solid #ddd;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
            background: white;
        }

        .number-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
            transform: scale(1.05);
        }

        .number-input.correct {
            border-color: #27ae60;
            background: #e8f5e8;
        }

        .number-input.incorrect {
            border-color: #e74c3c;
            background: #ffe6e6;
        }

        .input-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 600;
            margin-bottom: 5px;
            text-align: center;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 15px;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .feedback {
            margin: 20px 0;
            font-size: 1.3em;
            font-weight: 600;
            min-height: 30px;
        }

        .action-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #219a52;
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: #e74c3c;
        }

        .action-btn.secondary:hover {
            background: #c0392b;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-weight: 600;
        }

        .progress-indicator {
            margin: 20px 0;
            font-size: 1.1em;
            color: #666;
        }

        .sequence-display {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .display-area {
                font-size: 3em;
            }
            
            .input-fields {
                gap: 10px;
            }
            
            .number-input {
                font-size: 1.4em;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Number Memorization Master</h1>
            <p>Train your memory with number sequences!</p>
        </div>
        
        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <span class="control-label">Number of Digits</span>
                    <div class="control-buttons">
                        <button class="control-btn" onclick="setDigits(2)">2</button>
                        <button class="control-btn" onclick="setDigits(3)">3</button>
                        <button class="control-btn active" onclick="setDigits(4)">4</button>
                        <button class="control-btn" onclick="setDigits(5)">5</button>
                        <button class="control-btn" onclick="setDigits(6)">6</button>
                        <button class="control-btn" onclick="setDigits(7)">7</button>
                        <button class="control-btn" onclick="setDigits(8)">8</button>
                        <button class="control-btn" onclick="setDigits(9)">9</button>
                        <button class="control-btn" onclick="setDigits(10)">10</button>
                    </div>
                </div>
                
                <div class="control-group">
                    <span class="control-label">Number of Numbers</span>
                    <div class="control-buttons">
                        <button class="control-btn" onclick="setCount(2)">2</button>
                        <button class="control-btn" onclick="setCount(3)">3</button>
                        <button class="control-btn" onclick="setCount(4)">4</button>
                        <button class="control-btn active" onclick="setCount(5)">5</button>
                        <button class="control-btn" onclick="setCount(6)">6</button>
                        <button class="control-btn" onclick="setCount(7)">7</button>
                        <button class="control-btn" onclick="setCount(8)">8</button>
                        <button class="control-btn" onclick="setCount(9)">9</button>
                        <button class="control-btn" onclick="setCount(10)">10</button>
                    </div>
                </div>
                
                <div class="control-group">
                    <span class="control-label">Flash Duration</span>
                    <div class="control-buttons">
                        <button class="control-btn" onclick="setDuration(0.1)">0.1s</button>
                        <button class="control-btn" onclick="setDuration(0.3)">0.3s</button>
                        <button class="control-btn active" onclick="setDuration(0.5)">0.5s</button>
                        <button class="control-btn" onclick="setDuration(1.0)">1.0s</button>
                        <button class="control-btn" onclick="setDuration(1.5)">1.5s</button>
                        <button class="control-btn" onclick="setDuration(2.0)">2.0s</button>
                        <button class="control-btn" onclick="setDuration(3.0)">3.0s</button>
                        <button class="control-btn" onclick="setDuration(5.0)">5.0s</button>
                    </div>
                </div>
            </div>

            <div class="game-area">
                <div class="session-info" id="sessionInfo">
                    Ready to start! Click "Begin Practice" when ready.
                </div>
                
                <div class="display-area" id="displayArea">
                    🧠
                </div>
                
                <div class="input-area" id="inputArea" style="display: none;">
                    <div id="inputFields" class="input-fields"></div>
                    <button class="submit-btn" onclick="checkAnswer()" id="submitBtn" disabled>Submit</button>
                </div>
                
                <div class="feedback" id="feedback"></div>
                
                <button class="action-btn" onclick="startPractice()" id="startBtn">Begin Practice</button>
                <button class="action-btn secondary" onclick="stopPractice()" id="stopBtn" style="display: none;">Stop Practice</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="correctCount">0</div>
                    <div class="stat-label">Correct</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="accuracy">0%</div>
                    <div class="stat-label">Accuracy</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="currentStreak">0</div>
                    <div class="stat-label">Current Streak</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let settings = {
            digits: 4,
            count: 5,
            duration: 0.5
        };
        
        let currentSession = {
            active: false,
            sequence: [],
            currentIndex: 0,
            isDisplaying: false,
            isInputting: false
        };
        
        let stats = {
            correct: 0,
            total: 0,
            currentStreak: 0,
            bestStreak: 0
        };

        function setDigits(digits) {
            settings.digits = digits;
            updateActiveButton('digits', digits);
        }

        function setCount(count) {
            settings.count = count;
            updateActiveButton('count', count);
        }

        function setDuration(duration) {
            settings.duration = duration;
            updateActiveButton('duration', duration);
        }

        function updateActiveButton(type, value) {
            // Remove active class from all buttons in the group
            const buttons = event.target.parentElement.querySelectorAll('.control-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Add active class to clicked button
            event.target.classList.add('active');
        }

        function generateSequence() {
            const sequence = [];
            for (let i = 0; i < settings.count; i++) {
                let number = '';
                for (let j = 0; j < settings.digits; j++) {
                    number += Math.floor(Math.random() * 10);
                }
                sequence.push(number);
            }
            return sequence;
        }

        function startPractice() {
            currentSession.active = true;
            currentSession.sequence = generateSequence();
            currentSession.currentIndex = 0;
            currentSession.isDisplaying = true;
            currentSession.isInputting = false;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('feedback').textContent = '';
            
            updateSessionInfo();
            displaySequence();
        }

        function stopPractice() {
            currentSession.active = false;
            currentSession.isDisplaying = false;
            currentSession.isInputting = false;
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('displayArea').textContent = '🧠';
            document.getElementById('sessionInfo').textContent = 'Ready to start! Click "Begin Practice" when ready.';
            document.getElementById('feedback').textContent = '';
        }

        function updateSessionInfo() {
            if (currentSession.active) {
                if (currentSession.isDisplaying) {
                    document.getElementById('sessionInfo').textContent = 
                        `Showing sequence ${currentSession.currentIndex + 1}/${settings.count} - Watch carefully!`;
                } else if (currentSession.isInputting) {
                    document.getElementById('sessionInfo').textContent = 
                        `Enter the complete sequence (${settings.count} numbers, ${settings.digits} digits each)`;
                }
            }
        }

        function displaySequence() {
            if (!currentSession.active || !currentSession.isDisplaying) return;
            
            const displayArea = document.getElementById('displayArea');
            
            if (currentSession.currentIndex < settings.count) {
                // Show current number
                const currentNumber = currentSession.sequence[currentSession.currentIndex];
                displayArea.textContent = currentNumber;
                displayArea.style.color = '#667eea';
                
                // Use the actual duration setting
                const flashDuration = settings.duration * 1000; // Convert to milliseconds
                
                setTimeout(() => {
                    // Hide number
                    displayArea.textContent = '';
                    
                    setTimeout(() => {
                        currentSession.currentIndex++;
                        if (currentSession.currentIndex < settings.count) {
                            updateSessionInfo();
                            displaySequence();
                        } else {
                            // Sequence complete, start input phase
                            startInputPhase();
                        }
                    }, 300); // 300ms gap between numbers
                    
                }, flashDuration);
            }
        }

        function startInputPhase() {
            currentSession.isDisplaying = false;
            currentSession.isInputting = true;
            
            document.getElementById('displayArea').textContent = 'Enter the sequence:';
            document.getElementById('displayArea').style.color = '#2c3e50';
            document.getElementById('inputArea').style.display = 'block';
            
            // Create separate input fields for each number
            createInputFields();
            
            document.getElementById('submitBtn').disabled = false;
            
            // Focus on first input
            const firstInput = document.querySelector('.number-input');
            if (firstInput) firstInput.focus();
            
            updateSessionInfo();
        }

        function createInputFields() {
            const inputFields = document.getElementById('inputFields');
            inputFields.innerHTML = '';
            
            for (let i = 0; i < settings.count; i++) {
                const fieldContainer = document.createElement('div');
                fieldContainer.style.textAlign = 'center';
                
                const label = document.createElement('div');
                label.className = 'input-label';
                label.textContent = `Number ${i + 1}`;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'number-input';
                input.id = `input-${i}`;
                input.placeholder = '0'.repeat(settings.digits);
                input.maxLength = settings.digits;
                input.style.width = `${Math.max(settings.digits * 1.2, 3)}em`;
                
                // Add input event listener for auto-advance and formatting
                input.addEventListener('input', function(e) {
                    // Only allow digits
                    e.target.value = e.target.value.replace(/\D/g, '');
                    
                    // Auto-advance to next field when current is full
                    if (e.target.value.length === settings.digits) {
                        const nextInput = document.getElementById(`input-${i + 1}`);
                        if (nextInput) {
                            nextInput.focus();
                        }
                    }
                });
                
                // Add keydown event for backspace navigation
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && e.target.value === '' && i > 0) {
                        const prevInput = document.getElementById(`input-${i - 1}`);
                        if (prevInput) {
                            prevInput.focus();
                        }
                    }
                });
                
                fieldContainer.appendChild(label);
                fieldContainer.appendChild(input);
                inputFields.appendChild(fieldContainer);
            }
        }

        function checkAnswer() {
            if (!currentSession.active || !currentSession.isInputting) return;
            
            // Collect answers from all input fields
            const userAnswers = [];
            let allCorrect = true;
            
            for (let i = 0; i < settings.count; i++) {
                const input = document.getElementById(`input-${i}`);
                const userValue = input.value.padStart(settings.digits, '0'); // Pad with leading zeros
                const correctValue = currentSession.sequence[i];
                
                userAnswers.push(userValue);
                
                // Visual feedback for each input
                if (userValue === correctValue) {
                    input.classList.add('correct');
                    input.classList.remove('incorrect');
                } else {
                    input.classList.add('incorrect');
                    input.classList.remove('correct');
                    allCorrect = false;
                }
                
                // Disable input
                input.disabled = true;
            }
            
            stats.total++;
            
            if (allCorrect) {
                // Correct!
                stats.correct++;
                stats.currentStreak++;
                if (stats.currentStreak > stats.bestStreak) {
                    stats.bestStreak = stats.currentStreak;
                }
                
                document.getElementById('feedback').innerHTML = `
                    <div style="background: #e8f5e8; padding: 20px; border-radius: 12px; margin: 20px 0; border: 2px solid #a8e6a3;">
                        <div style="color: #27ae60; font-size: 1.4em; font-weight: 700; margin-bottom: 10px;">🎉 Perfect!</div>
                        <div class="sequence-display">
                            <strong>Sequence:</strong> ${currentSession.sequence.join(' - ')}
                        </div>
                        <div style="color: #27ae60; margin-top: 10px;">Streak: ${stats.currentStreak} | Click "Next" to continue</div>
                    </div>
                `;
                
            } else {
                // Wrong
                stats.currentStreak = 0;
                
                // Show detailed comparison
                let comparisonHtml = '';
                for (let i = 0; i < settings.count; i++) {
                    const userValue = userAnswers[i];
                    const correctValue = currentSession.sequence[i];
                    const isCorrect = userValue === correctValue;
                    
                    comparisonHtml += `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin: 8px 0; padding: 8px; background: ${isCorrect ? '#e8f5e8' : '#ffe6e6'}; border-radius: 6px;">
                            <div>
                                <strong>Number ${i + 1}:</strong> 
                                <span style="color: #27ae60; font-weight: 600;">${correctValue}</span>
                                ${!isCorrect ? `<span style="color: #e74c3c; margin-left: 10px;">(You: ${userValue})</span>` : ''}
                            </div>
                            <div style="font-size: 1.2em;">${isCorrect ? '✅' : '❌'}</div>
                        </div>
                    `;
                }
                
                document.getElementById('feedback').innerHTML = `
                    <div style="background: #ffe6e6; padding: 20px; border-radius: 12px; margin: 20px 0; border: 2px solid #ff9999;">
                        <div style="color: #e74c3c; font-size: 1.4em; font-weight: 700; margin-bottom: 15px;">❌ Some mistakes found</div>
                        ${comparisonHtml}
                        <div style="color: #e74c3c; margin-top: 15px; text-align: center;">Streak broken! Click "Next" to continue</div>
                    </div>
                `;
            }
            
            // Disable submit button temporarily
            document.getElementById('submitBtn').disabled = true;
            
            // Show next button
            document.getElementById('submitBtn').textContent = 'Next';
            document.getElementById('submitBtn').onclick = nextRound;
            document.getElementById('submitBtn').disabled = false;
            
            updateStats();
        }

        function nextRound() {
            // Reset for next round
            document.getElementById('submitBtn').textContent = 'Submit';
            document.getElementById('submitBtn').onclick = checkAnswer;
            document.getElementById('feedback').textContent = '';
            
            // Start new sequence
            startPractice();
        }

        function updateStats() {
            document.getElementById('correctCount').textContent = stats.correct;
            document.getElementById('totalCount').textContent = stats.total;
            
            const accuracy = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('currentStreak').textContent = stats.currentStreak;
        }

        // Global Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const submitBtn = document.getElementById('submitBtn');
                if (!submitBtn.disabled && submitBtn.style.display !== 'none') {
                    if (submitBtn.textContent === 'Submit') {
                        checkAnswer();
                    } else if (submitBtn.textContent === 'Next') {
                        nextRound();
                    }
                }
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
        });
    </script>
