        }

            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .group {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            min-width: 80px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transition: transform 0.2s ease;
            text-align: center;
            position: relative;
        }
        
        .group:hover {
            transform: translateY(-2px);
        }
        
        .group-number {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .group-word {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: normal;
            font-style: italic;
        }

            right: 5px;

            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }
        
        .copy-digit-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            opacity: 1;
            transform: scale(1.1);
        }

        }

            color: #999;

            margin-top: 20px;
        }

        function updateGroups(digits) {
            if (digits.length === 0) {
                output.innerHTML = '<div class="empty-state">Enter digits above to see them grouped with peg words</div>';
                document.getElementById('story-section').style.display = 'none';
                return;
            }
            
            const actualGroups = [];
            const words = [];
            
            if (currentMode === 2) {
                // Create groups of 2
                for (let i = 0; i < digits.length; i += 2) {
                    const group = digits.substr(i, 2);
                    actualGroups.push(group);
                    
                    // Pad single digit with 0 for word lookup
                    const paddedGroup = group.length === 1 ? group + '0' : group;
                    const word = pegWords[paddedGroup] || 'word';
                    words.push(word);
                }
            } else {
                // Create groups of 4 and convert to single words
                for (let i = 0; i < digits.length; i += 4) {
                    const group = digits.substr(i, 4);
                    actualGroups.push(group);
                    
                    // Use 4-digit peg word dictionary for single words
                    if (group.length === 4) {
                        const word = pegWords4Digit[group] || 'object';
                        words.push(word);
                    } else if (group.length >= 1) {
                        // Pad shorter groups with zeros
                        const paddedGroup = group.padEnd(4, '0');
                        const word = pegWords4Digit[paddedGroup] || 'object';
                        words.push(word);
                    }
                }
            }
            
            if (actualGroups.length === 0) {
                output.innerHTML = '<div class="empty-state">Enter digits above to see them grouped with peg words</div>';
                document.getElementById('story-section').style.display = 'none';
                return;
            }
            
            const groupsHtml = actualGroups.map((group, index) => {
                let word;
                if (currentMode === 2) {
                    const paddedGroup = group.length === 1 ? group + '0' : group;
                    word = pegWords[paddedGroup] || 'word';
                } else {
                    // For 4-digit groups, use single word from 4-digit dictionary
                    if (group.length === 4) {
                        word = pegWords4Digit[group] || 'object';
                    } else if (group.length >= 1) {
                        const paddedGroup = group.padEnd(4, '0');
                        word = pegWords4Digit[paddedGroup] || 'object';
                    }
                }
                
                return `
                    <div class="group">
                        <div class="group-number">${group}</div>
                        <div class="group-word">${word}</div>
                        <button class="copy-digit-btn" onclick="copyDigitGroup('${group}')" title="Copy ${group}">
                            📋
                        </button>
                    </div>
                `;
            }).join('');
            
            output.innerHTML = `
                <div class="groups-container">
                    ${groupsHtml}
                </div>
            `;
            
            // Generate story if we have at least 2 words
            if (words.length >= 2) {
                generateStory(words);
                document.getElementById('story-section').style.display = 'block';
            } else {
                document.getElementById('story-section').style.display = 'none';
            }
        }
